<div class="result-card">
  <h2>{{resultTitle}}</h2>
  <p>{{resultMessage}}</p>
  <div class="qr-wrap {{showImage}}">
    <img src="{{imageUrl}}" alt="Generated QR code with AI puppy" />
  </div>
  <a class="download {{showImage}}" href="{{downloadUrl}}" download="puppy-qr.png">
    Download QR Code
  </a>
</div>
